name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Generate Gradle Wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -o gradlew https://raw.githubusercontent.com/il12ya/AuraSender/main/gradlew
        curl -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/il12ya/AuraSender/main/gradle/wrapper/gradle-wrapper.jar
        curl -o gradle/wrapper/gradle-wrapper.properties https://raw.githubusercontent.com/il12ya/AuraSender/main/gradle/wrapper/gradle-wrapper.properties
        chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AuraSender-APK
        path: app/build/outputs/apk/debug/app-debug.apk
